name: "Schedule PR Merge"
on:
  issue_comment:
    types: [created]

jobs:
  schedule:
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/merge')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Parse and Label
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            const dateMatch = comment.match(/\/merge\s+(.+)/);

            if (!dateMatch) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: "not doin that, use: `/merge 2026-04-10T15:05:00Z`"
              });
              return;
            }

            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: context.issue.number,
              labels: ['scheduled-merge']
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `📅 Scheduled for merge at **${dateMatch[1]}**. I check every 15 minutes!`
            });
