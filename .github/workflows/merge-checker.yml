name: "Scheduled Merge Checker"
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check and Execute
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              ...context.repo,
              state: 'open'
            });

            for (const pr of prs) {
              if (pr.labels.find(l => l.name === 'scheduled-merge')) {
                const { data: comments } = await github.rest.issues.listComments({
                  ...context.repo,
                  issue_number: pr.number
                });
                
                const scheduleComment = comments.reverse().find(c => c.body.startsWith('/merge'));
                if (!scheduleComment) continue;

                const dateStr = scheduleComment.body.replace('/merge', '').trim();
                const targetDate = new Date(dateStr);
                const now = new Date();

                if (!isNaN(targetDate) && targetDate <= now) {
                  console.log(`Merging PR #${pr.number}...`);
                  try {
                    await github.rest.pulls.merge({
                      ...context.repo,
                      pull_number: pr.number,
                      merge_method: 'squash'
                    });
                    
                    await github.rest.issues.removeLabel({
                      ...context.repo,
                      issue_number: pr.number,
                      name: 'scheduled-merge'
                    });
                  } catch (e) {
                    console.log(`Merge failed: ${e.message}`);
                  }
                }
              }
            }
